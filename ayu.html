<!doctype html>
<html class="light" lang="en">
  <head>

    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link

      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"

    <link rel="stylesheet" href="styles.css" />

  <body

      data-speed="0.05"

    <div

      data-speed="0.08"
      style="animation-delay: -2s"

          AAV

        >
          <a
            class="text-on-surface-variant font-medium hover:scale-105 hover:text-primary transition-all duration-300 ease-out hover:-translate-y-1 active:scale-95 cursor-pointer dark:text-surface"

          <a
            class="text-primary font-bold border-b-4 border-secondary rounded-sm hover:scale-105 hover:text-primary transition-all duration-300 ease-out hover:-translate-y-1 active:scale-95 cursor-pointer"

        </div>
        <div class="flex items-center gap-2">

            class="flex items-center justify-center w-10 h-10 rounded-full bg-surface-container hover:bg-primary-container text-on-surface-variant hover:text-on-primary-container transition-all duration-300 hover:scale-110 active:scale-95"

            <span class="material-symbols-outlined">dark_mode</span>
          </button>
          <button
            aria-controls="mobile-menu"
            aria-expanded="false"
            aria-label="Toggle navigation menu"
            class="md:hidden flex items-center justify-center w-10 h-10 rounded-full bg-surface-container hover:bg-primary-container text-on-surface-variant hover:text-on-primary-container transition-all duration-300 active:scale-95"

          >
            <span class="material-symbols-outlined" id="mobile-menu-icon"

          </button>
        </div>
      </div>
      <div

        <a

    <!-- Footer -->

      <div

      >
        <div
          class="font-headline-lg text-headline-lg font-extrabold text-primary"
        >
          AAV
        </div>
        <div
          class="text-on-surface-variant dark:text-surface-variant font-body-md text-body-md"

    <!-- Floating Back to Top Button -->
    <button
      class="fixed bottom-8 right-8 w-14 h-14 bg-secondary text-on-secondary rounded-full shadow-xl flex items-center justify-center opacity-0 translate-y-10 transition-all duration-500 z-50 hover:scale-110 hover:shadow-secondary/40 pointer-events-none"
      id="backToTopBtn"
    >
      <span class="material-symbols-outlined font-bold text-2xl"
